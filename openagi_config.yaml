api:
  cors_enabled: true
  host: 0.0.0.0
  max_request_size: 10MB
  port: 8000
  swagger_enabled: true
  timeout: 30
  versioning: v1
  workers: 4
database:
  backup_enabled: true
  echo: false
  max_overflow: 20
  pool_size: 10
  type: sqlite
  url: sqlite:///openagi.db
features:
  adaptive_learning:
    batch_size: 32
    enabled: true
    learning_rate: 0.01
    model_update_interval: 3600
  anomaly_detection:
    algorithm: isolation_forest
    enabled: true
    sensitivity: 0.8
    window_size: 100
  auto_scaling:
    cooldown_period: 300
    enabled: true
    max_instances: 10
    min_instances: 1
    scale_down_threshold: 30
    scale_up_threshold: 80
  predictive_analysis:
    confidence_threshold: 0.75
    enabled: true
    models:
    - linear
    - arima
    - lstm
    prediction_horizon: 3600
logging:
  file_enabled: true
  file_path: ./logs/openagi.log
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  level: INFO
  retention_count: 10
  rotation_size: 10MB
  structured_logging: true
monitoring:
  agent_timeout: 60.0
  alert_thresholds:
    error_rate: 10.0
    response_time: 5.0
    success_rate: 90.0
  cpu_threshold: 80.0
  disk_threshold: 90.0
  enabled: true
  interval: 5
  max_history: 1000
  memory_threshold: 85.0
performance:
  cache_enabled: true
  cache_ttl: 300
  load_balancing: true
  max_concurrent_operations: 100
  memory_pool_size: 1GB
  optimization_enabled: true
  thread_pool_size: 10
platform:
  debug: false
  environment: production
  feature_flags:
    auto_scaling: true
    monitoring: true
    predictive_analysis: true
    recovery: true
    self_healing: true
  log_level: INFO
  max_agents: 1000
  name: OpenAGI
  version: 1.0.0
recovery:
  auto_backup: true
  backup_dir: ./backups
  backup_interval: 3600
  compression_enabled: true
  enabled: true
  encryption_enabled: false
  max_backups: 50
  retention_days: 30
security:
  api_key_required: true
  audit_logging: true
  authentication_required: true
  encryption_enabled: true
  rate_limiting:
    burst_limit: 200
    enabled: true
    requests_per_minute: 100
  session_timeout: 3600
self_healing:
  auto_recovery: true
  enabled: true
  healing_strategies:
  - restart
  - rollback
  - scale_up
  - scale_down
  - reconfigure
  - failover
  - optimize
  - repair
  learning_enabled: true
  max_retry_attempts: 3
  prediction_window: 600
  proactive_healing: true
  recovery_timeout: 300
