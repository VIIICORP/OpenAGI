[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "openagi"
version = "1.0.0"
description = "Comprehensive OpenAGI platform with 30M+ Self Healing AI features"
readme = "README.md"
license = {file = "LICENSE"}
authors = [
    {name = "VIIICORP", email = "contact@viiicorp.com"}
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
requires-python = ">=3.8"
dependencies = [
    "numpy>=1.20.0",
    "pandas>=1.3.0",
    "scikit-learn>=1.0.0",
    "torch>=1.9.0",
    "transformers>=4.20.0",
    "psutil>=5.8.0",
    "pyyaml>=6.0",
    "asyncio-utils>=0.1.1",
    "aiofiles>=0.7.0",
    "fastapi>=0.70.0",
    "uvicorn>=0.15.0",
    "pydantic>=1.8.0",
    "tenacity>=8.0.0",
    "schedule>=1.1.0",
    "prometheus-client>=0.12.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=6.0",
    "pytest-asyncio>=0.18.0",
    "pytest-cov>=3.0.0",
    "black>=22.0",
    "flake8>=4.0",
    "mypy>=0.950",
]

[project.urls]
Homepage = "https://github.com/VIIICORP/OpenAGI"
Repository = "https://github.com/VIIICORP/OpenAGI"
Issues = "https://github.com/VIIICORP/OpenAGI/issues"

[project.scripts]
openagi = "openagi.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["openagi*"]

[tool.black]
line-length = 88
target-version = ['py38']

[tool.mypy]
python_version = "3.8"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true